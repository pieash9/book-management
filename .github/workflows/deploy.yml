name: Deploy to Shared Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_PATH: /var/www/305c8fd8-a8c5-46ba-98cd-145f7b84a278/book.pieash9.me

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Deploy application code via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e

            cd "${{ env.APP_PATH }}"

            git checkout main

            git pull origin main

            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            php artisan optimize:clear

            php artisan migrate --force

            mkdir -p public/build
            php artisan storage:link || true
            chmod -R 775 storage
            chmod -R 775 bootstrap/cache

      - name: Upload built frontend assets
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: public/build/*
          target: ${{ env.APP_PATH }}/public/build
          strip_components: 2
          rm: true
          overwrite: true

      - name: Finalize Laravel deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 15m
          script: |
            set -e

            cd "${{ env.APP_PATH }}"

            php artisan optimize
            php artisan queue:restart || true
