name: Deploy to Shared Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            APP_DIR=""

            for candidate in \
              "$HOME/book.pieash9.me" \
              "$HOME/public_html/book.pieash9.me" \
              "$HOME/domains/book.pieash9.me" \
              "$HOME/domains/book.pieash9.me/laravel"
            do
              if [ -f "$candidate/artisan" ] && [ -d "$candidate/.git" ]; then
                APP_DIR="$candidate"
                break
              fi
            done

            if [ -z "$APP_DIR" ]; then
              APP_DIR=$(find "$HOME" -maxdepth 4 -type f -name artisan 2>/dev/null | while read -r artisan_file; do
                candidate_dir=$(dirname "$artisan_file")
                if [ -d "$candidate_dir/.git" ]; then
                  echo "$candidate_dir"
                  break
                fi
              done)
            fi

            [ -n "$APP_DIR" ] || { echo "Laravel app directory not found under $HOME"; exit 1; }
            cd "$APP_DIR" || { echo "Failed to enter app directory: $APP_DIR"; exit 1; }

            # Pull the latest code
            git pull origin main || { echo "Git pull failed"; exit 1; }

            # Install Composer dependencies (without dev dependencies)
            composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction || { echo "Composer install failed"; exit 1; }

            # Clear all caches using optimize:clear
            php artisan optimize:clear || { echo "Optimize clear failed"; exit 1; }

            # Run database migrations
            php artisan migrate --force || { echo "Migrations failed"; exit 1; }

            # Optimize the application (caches config, routes, and views)
            php artisan optimize || { echo "Optimize failed"; exit 1; }

            # Set proper permissions
            chmod -R 755 storage || { echo "Storage permissions failed"; exit 1; }
            chmod -R 755 bootstrap/cache || { echo "Cache permissions failed"; exit 1; }
            echo "Deployment successful!"